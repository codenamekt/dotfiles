unbind R
bind R source-file ~/.tmux.conf
unbind r
bind-key r command-prompt -p "Rename pane to…" "select-pane -T '%%'"

set-option -g status-position top
set-option -g default-shell "/usr/bin/zsh"

set -g mouse on
set -g history-limit 65535
set -g extended-keys on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha
# ── Enable the Catppuccin status line widgets you need ─────────────────────
# Possible values: cpu, ram, uptime, session, battery, weather, … (see the docs)
set -g @catppuccin_status_modules "cpu ram uptime session"

# (Optional) Force the widgets to be drawn even if the terminal does not support true‑color.
set -g @catppuccin_status_force true
set -g default-terminal "tmux-256color"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
